name: Build Flatpak
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0 - without the v prefix)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flatpak and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add flathub remote
        run: |
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install runtimes and SDK
        run: |
          flatpak install -y --user flathub org.freedesktop.Platform//23.08
          flatpak install -y --user flathub org.freedesktop.Sdk//23.08
          flatpak install -y --user flathub org.electronjs.Electron2.BaseApp//23.08

      - name: Download and extract AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p build-input
          cd build-input

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            APPIMAGE_NAME="GaiaMod-${{ github.event.inputs.version }}-arm64.AppImage"
          else
            APPIMAGE_NAME="GaiaMod-${{ github.event.inputs.version }}.AppImage"
          fi
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${{ github.event.inputs.version }}/${APPIMAGE_NAME}"

          echo "Downloading ${{ matrix.arch }} AppImage from: ${DOWNLOAD_URL}"
          if ! wget "${DOWNLOAD_URL}" -O gaiamod.AppImage; then
            echo "Failed to download AppImage. Available assets:"
            gh release view "v${{ github.event.inputs.version }}" --json assets -q '.assets[].name'
            exit 1
          fi

          echo "Extracting AppImage..."
          chmod +x gaiamod.AppImage
          ./gaiamod.AppImage --appimage-extract

          mv squashfs-root/* .
          rm -rf squashfs-root gaiamod.AppImage

          if [ ! -f "gaiamod" ]; then
            echo "ERROR: gaiamod executable not found! Contents of build-input:"
            ls -la
            exit 1
          fi

          chmod +x gaiamod
          echo "Build input prepared successfully!"

      - name: Verify Flatpak manifest exists
        run: |
          for f in ".flatpak/com.gaiamod.desktop.json" ".flatpak/com.gaiamod.desktop.desktop"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f not found!"
              exit 1
            fi
          done
          echo "Flatpak manifest files found!"

      - name: Build Flatpak and create bundle
        run: |
          echo "Building Flatpak..."
          flatpak-builder --user --force-clean --repo=repo build-dir .flatpak/com.gaiamod.desktop.json

          echo "Creating bundle..."
          flatpak build-bundle repo com.gaiamod.desktop.flatpak com.gaiamod.desktop

          if [ ! -f "com.gaiamod.desktop.flatpak" ]; then
            echo "ERROR: Bundle file not found after creation!"
            exit 1
          fi

          echo "Bundle created successfully!"
          ls -lh com.gaiamod.desktop.flatpak

      - name: Test Flatpak installation
        run: |
          echo "Testing Flatpak installation..."
          flatpak install -y --user com.gaiamod.desktop.flatpak

          echo "Verifying gaiamod executable..."
          flatpak run --command=sh com.gaiamod.desktop -c \
            "test -x /app/gaiamod/gaiamod && echo 'Executable found and is executable' || (echo 'ERROR: Executable not found or not executable'; exit 1)"

          echo "Flatpak test completed successfully!"

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle-${{ matrix.arch }}
          path: com.gaiamod.desktop.flatpak
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download x64 bundle
        uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle-x64
          path: bundles/x64

      - name: Download arm64 bundle
        uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle-arm64
          path: bundles/arm64

      - name: Rename bundles
        run: |
          mv bundles/x64/com.gaiamod.desktop.flatpak bundles/com.gaiamod.desktop-x64.flatpak
          mv bundles/arm64/com.gaiamod.desktop.flatpak bundles/com.gaiamod.desktop-arm64.flatpak

      - name: Upload both bundles to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bundles/com.gaiamod.desktop-x64.flatpak
            bundles/com.gaiamod.desktop-arm64.flatpak
          tag_name: v${{ github.event.inputs.version }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}